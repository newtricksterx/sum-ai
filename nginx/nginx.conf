worker_processes 2;
worker_rlimit_nofile 1024;

limit_req_zone $binary_remote_addr zone=api_limit:5m rate=10r/s;

gzip on;
gzip_types application/json text/plain text/css application/javascript;
gzip_min_length 1024;

server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Django static files. Requires the static_volume from docker-compose.prod.yml
    # to be mounted at /usr/share/nginx/static (see D0.3 in the plan).
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        access_log off;
    }

    # Every request from your extension should start with /api/
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Optional: A generic response for the root URL
    location / {
        return 200 "API is running over HTTPS.";
        add_header Content-Type text/plain;
    }
}
