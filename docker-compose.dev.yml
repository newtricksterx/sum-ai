
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # This maps your local folder to the container's /app folder
    container_name: backend
    restart: always
    env_file: ./backend/.env
    # dev file uses runserver - development mode
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - app_network

  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge