services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      # This tells Python to use the system-wide certificate store
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    expose:
      - "8000"
    container_name: backend
    restart: always
    env_file: ./backend/.env.prod
    # Use Gunicorn instead of runserver for AWS
    command: >
      gunicorn backend.wsgi:application
      --bind 0.0.0.0:8000
      --preload
      --workers 2
      --worker-class gthread
      --threads 4
      --timeout 90
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 50
      --access-logfile -
      --error-logfile -
      --worker-tmp-dir /dev/shm

    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    volumes:
      - static_volume:/app/staticfiles
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app_network

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c shared_buffers=32MB -c work_mem=2MB -c maintenance_work_mem=16MB -c effective_cache_size=64MB
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - app_network

  init:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: ./backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput"
    volumes:
      - static_volume:/app/staticfiles
    networks:
      - app_network


  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/share/nginx/static:ro
    deploy:
      resources:
        limits:
          memory: 32M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
